  <title id="fig-title">Hydrostatic Equilibrium — The Sun as a Thermostat</title>
  <desc>Two opposing feedback loops show how the Sun self-regulates. Outer loop (sky-blue, cooling-corrects): core cools slightly → fusion slows → pressure drops → outer layers compress → core heats → fusion accelerates → returns to equilibrium. Inner loop (vermillion, heating-corrects): core heats slightly → fusion accelerates → pressure rises → layers expand → core cools → fusion slows. The exponential temperature dependence of fusion rate makes the feedback strong; perturbations damp within seconds.</desc>
