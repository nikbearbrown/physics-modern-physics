  <title id="fig-title">White Dwarf Mass-Radius — More Massive Means Smaller</title>
  <desc>Plot of white dwarf radius (in Earth radii) versus mass (in solar masses). The curve falls counterintuitively — heavier white dwarfs are smaller. As mass approaches the Chandrasekhar limit of about 1.4 solar masses, the radius shrinks toward zero — vertical asymptote. Chandrasekhar derived this at age 20 on a ship from India to England in 1930.</desc>
