  <text x="350" y="380" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">Newton's gravity does not bend light by 1.75 arcseconds. Only spacetime curvature does.</text>
  <text x="350" y="398" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">Eddington's 1919 eclipse photographs settled it — and made Einstein world-famous.</text>
