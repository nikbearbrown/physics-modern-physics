  <title id="fig-title">Light Bending Near the Sun — Newton vs Einstein</title>
  <desc>Two side-by-side panels showing starlight grazing the Sun's limb. Panel A Newton: flat space and a tiny deflection (corpuscular gravity predicts about 0.87 arcseconds). Panel B Einstein: spacetime curved by the Sun's mass, light follows the curved geodesic, deflected by 1.75 arcseconds — twice the Newtonian value. Eddington's 1919 eclipse confirmed Einstein.</desc>
