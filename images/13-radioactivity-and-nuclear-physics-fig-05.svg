  <title id="fig-title">Binding Energy per Nucleon — Why Both Fusion AND Fission Release Energy</title>
  <desc>Plot of binding energy per nucleon in MeV versus mass number A from 1 to 240. Curve rises sharply from hydrogen-1 at zero, spikes at helium-4, smoothly rises to a peak at iron-56 around 8.8 MeV per nucleon, then gradually declines toward uranium-238 at 7.6 MeV per nucleon. Fe-56 marked as the most tightly bound nucleus. Fusion releases energy going up the left side; fission releases energy coming down the right.</desc>
