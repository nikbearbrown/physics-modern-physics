  <title id="fig-title">Neutrino Oscillation — How "Missing" Solar Neutrinos Were Found</title>
  <desc>A horizontal path from Sun to Earth shows three stacked bars representing the flavor composition of solar neutrinos. At the Sun's core, all are electron neutrinos. Midway, the bar shows roughly a third electron, a third muon, a third tau. At Earth's detector, the bar shows the same one-third split. Davis's chlorine tank in the 1960s saw only electron neutrinos and counted one-third of the expected flux. Sudbury Neutrino Observatory measured all three flavors and recovered the full flux — confirming neutrino mass and oscillation.</desc>
