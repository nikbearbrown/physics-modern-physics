  <title id="fig-title">Galactic Rotation Curve — The Smoking Gun for Dark Matter</title>
  <desc>Plot of orbital speed in kilometers per second versus distance from the galactic center in kiloparsecs. Two curves: the Newtonian prediction from visible mass alone peaks near the visible-disk edge at about 15 kiloparsecs and falls thereafter as 1 over square root of r. The observed rotation curve rises, levels off near 220 kilometers per second, and stays flat well beyond the visible disk. The gap between the two curves is the gravitational signature of dark matter.</desc>
