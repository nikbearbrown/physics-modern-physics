  <line x1="350" y1="320" x2="500" y2="120" stroke="#C8860E" stroke-width="2.5"/>
  <text x="508" y="116" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8860E">B (v ≈ 0.6c)</text>

