  <title id="fig-title">Minkowski Spacetime — The Invariant Interval</title>
  <desc>A spacetime diagram with x horizontal and c t vertical. Light cones drawn as 45 degree diagonals from the origin. Two world lines: one for a stationary observer (vertical) and one for a moving observer (tilted). Two events plotted. The stationary observer's simultaneity slice is horizontal; the moving observer's slice is tilted (sheared). Different observers disagree about which events are simultaneous, but the spacetime interval s squared equals c delta t squared minus delta x squared is the same for both.</desc>
