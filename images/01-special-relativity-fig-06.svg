  <title id="fig-title">Energy vs v/c — Newton Is a Low-Speed Limit of Einstein</title>
  <desc>Plot of total energy divided by rest energy as a function of v over c. Three curves: rest energy m c squared as a flat line at y equals one; Newtonian m c squared plus one-half m v squared as a gentle quadratic; relativistic gamma m c squared diverging to infinity as v approaches c. The Newtonian and relativistic curves are indistinguishable below v over c around 0.1 and diverge dramatically above 0.5.</desc>
