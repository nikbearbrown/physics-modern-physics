  <!-- Temperature curve. Approximate profile:
       altitude 0:    T = 5800 K     → y = 340 - log10(5.8/1)*60 = 340 - 1.76*60 = 234
       altitude 500:  T = 4400 K     → y = 340 - log10(4.4)*60 = 340 - 0.64*60 = 302 (photospheric min) - WAIT log10(4400/1000) = 0.643
       Actually y(T) = 340 - log10(T/1000)*60. For T=1000 K, y=340.
       T=4400:  y = 340 - log10(4.4)*60 = 340 - 0.64*60 = 301.4
       T=5800:  y = 340 - log10(5.8)*60 = 340 - 0.763*60 = 294.2
       T=10000: y = 340 - 60 = 280 (chromosphere)
       T=100000:y = 340 - 120 = 220 (transition region)
       T=1e6:   y = 340 - 180 = 160 (corona)
       T=2e6:   y = 340 - log10(2000)*60 = 340 - 3.30*60 = 142

       Altitudes:
       photosphere top: 0-500 km
       photospheric min: ~500 km
       chromosphere: 500-2500 km
       transition region: 2500-2700 km (sharp)
       corona: 2700+ km

       x = 100 + altitude/10000 * 560 -->
