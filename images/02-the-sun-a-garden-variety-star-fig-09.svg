  <title id="fig-title">Solar Atmosphere Temperature vs Altitude</title>
  <desc>Plot of temperature on a log scale from 10 thousand kelvin up to a few million versus altitude in kilometers above the photosphere. The temperature minimum is at the top of the photosphere around 4400 K, rises through the chromosphere to about 10000 K, then jumps abruptly through the thin transition region to coronal values above one million K. The coronal heating problem: why is the corona 200 times hotter than the surface below it?</desc>
