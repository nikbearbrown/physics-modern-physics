  <title id="fig-title">X-ray Binary — Mass Streams from Star to Black Hole, Emitting X-rays</title>
  <desc>A binary system in cross-section. A normal companion star on the left fills its Roche lobe and sheds gas through the inner Lagrange point. The gas spirals into an accretion disk around a compact black hole on the right. The inner disk reaches millions of kelvin and emits X-rays. The black hole is marked by a small dark disk surrounded by the event horizon circle.</desc>
