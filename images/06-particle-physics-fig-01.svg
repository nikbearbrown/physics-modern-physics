  <rect x="60" y="386" width="580" height="50" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="406" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">Gravity is 10³⁸ × weaker than EM — yet runs the universe because it doesn't cancel.</text>
  <text x="350" y="424" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">Carrier mass sets the range — via the uncertainty principle (massive carrier → short range).</text>
