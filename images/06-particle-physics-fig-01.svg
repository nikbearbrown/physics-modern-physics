  <title id="fig-title">Four Fundamental Forces — Strength, Range, and Carrier</title>
  <desc>Comparison table of the four fundamental forces. Gravity: relative strength 1, range infinite, carrier graviton (hypothetical). Weak: strength 10 to the 25, range 10 to the minus 18 meters, carriers W and Z bosons. Electromagnetic: strength 10 to the 36, range infinite, carrier photon. Strong: strength 10 to the 38, range 10 to the minus 15 meters, carrier gluons. Gravity is 10 to the 38 times weaker than EM but runs the universe at large scales because it does not cancel.</desc>
