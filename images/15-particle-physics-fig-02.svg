  <line x1="340" y1="220" x2="360" y2="220" stroke="#2a1a0e" stroke-width="1" marker-end="url(#arrowred15)"/>
  <text x="270" y="244" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">flux tube · E ∝ r</text>

