  <rect x="200" y="100" width="140" height="180" fill="none" stroke="#2a1a0e" stroke-width="0.75"/>
  <text x="270" y="92" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#2a1a0e">(2) pulled apart</text>
  <circle cx="220" cy="190" r="10" fill="#56B4E9" stroke="#2a1a0e" stroke-width="0.75"/>
  <text x="220" y="194" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#FFFFFF">q</text>
