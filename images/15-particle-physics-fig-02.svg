  <text x="540" y="194" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#FFFFFF">q</text>
  <circle cx="560" cy="190" r="10" fill="#C8860E" stroke="#2a1a0e" stroke-width="0.75"/>
  <text x="560" y="194" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#FFFFFF">q̄'</text>

  <!-- Right meson: new q' + original q̄ -->
  <circle cx="610" cy="190" r="10" fill="#C8860E" stroke="#2a1a0e" stroke-width="0.75"/>
  <text x="610" y="194" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#FFFFFF">q'</text>
  <circle cx="630" cy="190" r="10" fill="#56B4E9" stroke="#2a1a0e" stroke-width="0.75"/>
  <text x="630" y="194" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#FFFFFF">q̄</text>

  <!-- New bonds -->
  <line x1="548" y1="190" x2="552" y2="190" stroke="#C8102E" stroke-width="2"/>
  <line x1="618" y1="190" x2="622" y2="190" stroke="#C8102E" stroke-width="2"/>

  <text x="590" y="244" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">no free quarks</text>

  <!-- Caption -->
  <rect x="40" y="300" width="620" height="60" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="320" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">Color confinement: the flux tube stores energy linearly with separation.</text>
  <text x="350" y="338" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">Long before you can isolate the quark, the tube creates a new pair.</text>
  <text x="350" y="354" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">No isolated quark has ever been observed. QCD's most counterintuitive prediction.</text>
