  <title id="fig-title">Quark Confinement — Pull Them Apart and Get Two Mesons</title>
  <desc>Four-panel sequence showing what happens when you try to separate a quark from an antiquark. Panel 1: pair close together with a weak field line. Panel 2: pulled apart, the gluon field forms a tube whose energy grows linearly with separation. Panel 3: tube stretched far enough that the stored energy exceeds the mass-energy of a new quark-antiquark pair. Panel 4: tube snaps, creating a new pair in the middle. Now there are two mesons. You cannot isolate a single quark.</desc>
