  <text x="490" y="194" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#FFFFFF">q̄</text>
  <!-- Stretched flux tube (thicker, brighter) -->
  <rect x="378" y="183" width="104" height="14" fill="#C8102E" opacity="0.8"/>
  <text x="430" y="244" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">about to snap...</text>

