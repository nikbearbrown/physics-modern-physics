  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Velocity Addition — Why You Can't Add Up to Faster Than Light</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">v = 0.5c fixed. Classical addition exceeds c; relativistic addition saturates exactly at c.</text>

