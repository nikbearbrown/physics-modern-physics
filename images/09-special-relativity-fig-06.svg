  <title id="fig-title">Velocity Addition — Classical Exceeds c, Relativistic Saturates at c</title>
  <desc>Plot of combined speed u versus the object's speed u-prime as measured in the moving frame, with v fixed at 0.5 c. Classical formula u equals v plus u-prime is a straight line that crosses c at u-prime equals 0.5 c. Relativistic formula u equals (v plus u-prime) over (1 plus v u-prime over c squared) is a curve that asymptotes to c. Horizontal dashed line at u equals c is the cosmic speed limit.</desc>
