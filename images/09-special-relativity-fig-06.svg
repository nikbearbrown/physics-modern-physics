  <!-- Classical line: u = v + u' = 0.5c + u'. At u'=0, u=0.5c (y=260). At u'=0.5c, u=1.0c (y=180). At u'=1.0c, u=1.5c (y=100). Linear -->
  <line x1="100" y1="260" x2="640" y2="100" stroke="#56B4E9" stroke-width="2.5"/>
  <text x="280" y="156" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#56B4E9">classical: u = v + u'</text>
  <text x="280" y="168" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#56B4E9">exceeds c — wrong</text>

  <!-- Relativistic: u = (0.5c + u')/(1 + 0.5 u'/c). At u'=0, u=0.5c; at u'=0.5c, u=(1.0c)/(1.25)=0.8c; at u'=0.8c, u=1.3c/1.4=0.929c; at u'=c, u=c -->
  <!-- y mapping: y(u/c) = 340 - (u/c)*160. So 0.5→260, 0.8→212, 0.929→191.4, 1.0→180 -->
  <path d="M 100 260 Q 250 240 316 224 Q 424 200 532 188 Q 588 184 640 180" stroke="#C8102E" stroke-width="2.5" fill="none"/>
  <text x="420" y="220" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#C8102E">relativistic — saturates at c</text>

