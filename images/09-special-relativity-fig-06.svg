  <text x="324" y="220" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">relativistic: 0.8c</text>

  <!-- Formula -->
  <rect x="60" y="386" width="580" height="22" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
