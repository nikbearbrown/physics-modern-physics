  <title id="fig-title">Light Clock — The Geometric Derivation of Time Dilation</title>
  <desc>Two panels of a light pulse bouncing between two mirrors. Panel A rest frame: vertical path of length two h, period equals two h over c. Panel B moving frame: clock translates rightward at velocity v, light traces a diagonal — the hypotenuse of a right triangle with legs h and v delta t over 2. Pythagoras gives delta t equals two h over c divided by square root of one minus v squared over c squared, equal to gamma times proper time.</desc>
