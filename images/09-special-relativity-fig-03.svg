  <rect x="60" y="360" width="580" height="50" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="382" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#2a1a0e">(c Δt/2)² = h² + (v Δt/2)²   →   Δt = 2h/c · 1/√(1 − v²/c²)</text>
  <text x="350" y="400" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">Pythagoras + the invariance of c gives γ.</text>
