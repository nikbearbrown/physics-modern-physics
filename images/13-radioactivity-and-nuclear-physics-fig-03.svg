  <title id="fig-title">Beta Decay Spectrum — Why Pauli Invented the Neutrino</title>
  <desc>Two curves on the same plot of count rate versus electron kinetic energy. The expected two-body decay would give a sharp delta-function peak at the Q-value energy. The observed spectrum is a broad continuous distribution from zero to Q-max. The missing energy and momentum drove Pauli in 1930 to propose a new invisible particle — the neutrino — carrying the rest of the energy. Confirmed 26 years later.</desc>
