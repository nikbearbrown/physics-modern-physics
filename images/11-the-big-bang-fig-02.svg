  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Freeze-out ratio 6 p : 1 n → ~25% He-4 by mass. Chain stops at He-4.</text>

