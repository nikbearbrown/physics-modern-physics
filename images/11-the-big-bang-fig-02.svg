  <title id="fig-title">Big Bang Nucleosynthesis — How H and He Were Made</title>
  <desc>Reaction network during the first three minutes. Free protons and neutrons freeze out at a ratio of about 6 to 1. Deuterium forms from p plus n. Tritium and helium-3 form from deuterium-deuterium reactions. Helium-4 is the bottleneck endpoint because there are no stable mass-5 or mass-8 nuclei. Trace lithium-7 forms as a side branch. Result: about 25 percent helium-4 by mass.</desc>
