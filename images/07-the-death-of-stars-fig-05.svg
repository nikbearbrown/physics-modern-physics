  <title id="fig-title">Pulsar Lighthouse — Magnetic and Rotation Axes Misaligned</title>
  <desc>A rotating neutron star with vertical rotation axis. The magnetic axis is tilted about 30 degrees from the rotation axis. Twin radio beams emerge from the magnetic poles and sweep around as the star rotates. Earth lies in the path of one beam — we see a pulse every rotation. Without the tilt, no pulse would be seen.</desc>
