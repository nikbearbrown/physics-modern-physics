  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Bell Burnell 1967 saw the regular pulses on paper tape. The cause: misaligned magnetic axis.</text>

