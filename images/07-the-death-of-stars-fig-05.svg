  <text x="350" y="380" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">Without the tilt, no pulse would ever be seen.</text>
  <text x="350" y="398" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">Pulsars are clocks accurate to nanoseconds — slowing imperceptibly as they radiate.</text>
