  <title id="fig-title">Hubble Diagram — The Hubble Tension</title>
  <desc>Plot of recession velocity versus distance for galaxies. Two slightly different best-fit lines reflect the Hubble tension: early-universe CMB measurements give H zero around 67 kilometers per second per megaparsec, while late-universe supernova measurements give 73. The 4 sigma discrepancy is one of the most active problems in modern cosmology. See Chapter 11 Figure 11.1 for the original Hubble's law context.</desc>
