  <title id="fig-title">The Coulomb Barrier and Quantum Tunneling</title>
  <desc>Potential energy curve for two approaching protons as a function of separation. At large separation the Coulomb repulsion rises steeply to a peak around one femtometer; inside that radius the strong nuclear force pulls the protons into a deep binding well. Thermal energy at solar core temperature is millions of times below the peak — classically the protons should never touch. But quantum mechanics lets the wavefunction leak through with vanishing probability, around ten to the minus 20 per collision. Multiplied by 10 to the 57 protons in collision constantly, that vanishing becomes 600 million tonnes per second of hydrogen fused.</desc>
