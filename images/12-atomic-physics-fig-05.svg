  <title id="fig-title">Reading the Sun's Composition Atom by Atom</title>
  <desc>Visible solar spectrum rainbow with dark Fraunhofer absorption lines. Each line is at a wavelength characteristic of a specific element absorbing light in the Sun's atmosphere. Labels: hydrogen H alpha at 656, sodium D doublet at 589, magnesium b triplet at 518, hydrogen H beta at 486, hydrogen H gamma at 434, calcium H and K at 393 and 397. The atomic ladder makes the spectrum readable. See Chapter 2 Figure 2.2.</desc>
