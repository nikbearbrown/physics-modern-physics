  <title id="fig-title">Higgs Discovery — A Bump at 125 GeV in the Diphoton Spectrum</title>
  <desc>Plot of events versus diphoton invariant mass from ATLAS or CMS 2012 data. Smooth falling QCD continuum background curve. A clear sharp bump appears at about 125 GeV — the Higgs boson signal. Data points with error bars; background fit and signal-plus-background fit overlaid. The bump corresponds to a 5-sigma deviation, the discovery threshold in particle physics.</desc>
