  <title id="fig-title">Earth's Magnetosphere During a CME Impact</title>
  <desc>Side view of Earth's magnetosphere. The Sun is on the left, Earth on the right. On the day side facing the Sun, the magnetic field is compressed forming a bow shock. On the night side, the magnetotail stretches into space. A coronal mass ejection — a plasma cloud — arrives from the left and compresses the day-side magnetosphere. If the CME field is southward (anti-aligned with Earth's field), reconnection at the day-side magnetopause drives a geomagnetic storm.</desc>
