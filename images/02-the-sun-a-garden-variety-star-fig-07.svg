  <text x="180" y="244" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="9" fill="#C8102E" letter-spacing="0.06em">(C) TOROIDAL — FLUX ROPES FORM</text>
