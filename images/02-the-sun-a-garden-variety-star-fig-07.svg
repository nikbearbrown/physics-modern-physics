  <text x="350" y="404" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">The Sun's equator laps its poles every ~5 years.</text>
  <text x="350" y="422" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">Field lines that started as a smooth N-S dipole end up wound and tangled — and erupt.</text>
  <text x="350" y="438" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">Reverses every 11 years → full magnetic cycle is 22 years.</text>
