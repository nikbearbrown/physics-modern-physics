  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Babcock-Leighton Dynamo — Differential Rotation Builds the Cycle</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Poloidal → wound → toroidal → erupts as sunspots. Repeats every ~11 years.</text>

