  <desc>Four-panel sequence. Panel A: initial poloidal field running North to South. Panel B: equator rotates faster than poles, the field stretches eastward at low latitudes. Panel C: continued winding produces toroidal flux ropes. Panel D: flux ropes rise buoyantly through the convection zone and emerge as bipolar sunspot pairs at the surface.</desc>
