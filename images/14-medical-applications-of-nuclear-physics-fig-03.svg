  <!-- Reference points -->
  <!-- Dental X-ray 5 µSv (log=-5.3) → y=420 - 0.7*47.1 — actually log(5e-6) = -5.30 → y = 90+6.30*47.1 = 386 -->
  <circle cx="300" cy="386" r="3.5" fill="#56B4E9"/>
  <line x1="305" y1="386" x2="350" y2="386" stroke="#545454" stroke-width="0.5"/>
  <text x="356" y="390" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#2a1a0e">dental X-ray · 5 µSv</text>

  <!-- Flight 30 µSv = 3e-5 Sv, log=-4.52 → y=90+5.52*47.1 = 350 -->
  <circle cx="300" cy="350" r="3.5" fill="#56B4E9"/>
  <line x1="305" y1="350" x2="350" y2="350" stroke="#545454" stroke-width="0.5"/>
  <text x="356" y="354" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#2a1a0e">transatlantic flight · 30 µSv</text>

  <!-- Chest X-ray 100 µSv = 1e-4 Sv, log=-4 → y=90+5*47.1=326 -->
  <circle cx="300" cy="326" r="3.5" fill="#56B4E9"/>
  <line x1="305" y1="326" x2="350" y2="326" stroke="#545454" stroke-width="0.5"/>
  <text x="356" y="330" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#2a1a0e">chest X-ray · 0.1 mSv</text>

  <!-- Background/year 3 mSv = 3e-3, log=-2.52 → y=90+3.52*47.1=256 -->
  <circle cx="300" cy="256" r="3.5" fill="#3AAE3A"/>
  <line x1="305" y1="256" x2="350" y2="256" stroke="#545454" stroke-width="0.5"/>
