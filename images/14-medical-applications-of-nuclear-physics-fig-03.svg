    <text x="290" y="189">100 mSv</text>
    <text x="290" y="142">1 Sv</text>
    <text x="290" y="95">10 Sv</text>
  </g>

  <!-- Shaded bands (left of axis) -->
  <rect x="240" y="232" width="60" height="188" fill="#3AAE3A" opacity="0.15"/>
  <rect x="240" y="138" width="60" height="94" fill="#C8860E" opacity="0.2"/>
  <rect x="240" y="91" width="60" height="47" fill="#C8102E" opacity="0.25"/>

  <text x="244" y="408" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="8" fill="#3AAE3A" transform="rotate(-90 244 408)">routine / background</text>
