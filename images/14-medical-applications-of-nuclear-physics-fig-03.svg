  <rect x="0" y="0" width="700" height="480" fill="#FFFFFF"/>

  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Radiation Dose Scale — 0.005 mSv to 5 Sv (Six Orders of Magnitude)</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Log axis. Background; diagnostic; occupational concern; acute danger.</text>

  <!-- Axis -->
  <line x1="300" y1="420" x2="300" y2="90" stroke="#2a1a0e" stroke-width="1"/>
  <text x="180" y="260" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#545454" letter-spacing="0.06em" transform="rotate(-90 180 260)">EQUIVALENT DOSE (Sv, LOG)</text>

  <!-- y mapping: log -6 (0.001 µSv = 1 nSv) → y=420; log +1 (10 Sv) → y=90. 7 decades over 330 px = 47.1 px/dec.
       y(logS) = 420 - (logS + 6)*47.1 — but we're using Sv. Range is 10^-6 Sv (1 µSv = .001 mSv) to 10^1 Sv.
       y(log[Sv]) = 90 + (1 - log)*47.1
       0.001 mSv = 10⁻⁶ Sv: log=-6 → y=420
       0.01 mSv = 10⁻⁵: y=373
       0.1 mSv = 10⁻⁴: y=326
       1 mSv = 10⁻³: y=279
       10 mSv = 10⁻²: y=232
       100 mSv = 10⁻¹: y=185
       1 Sv = 10⁰: y=138
       10 Sv = 10¹: y=91 -->

  <!-- Tick marks and labels -->
  <g stroke="#2a1a0e" stroke-width="0.5">
    <line x1="295" y1="420" x2="305" y2="420"/>
    <line x1="295" y1="373" x2="305" y2="373"/>
    <line x1="295" y1="326" x2="305" y2="326"/>
    <line x1="295" y1="279" x2="305" y2="279"/>
