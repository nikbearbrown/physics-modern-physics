  <!-- PET-CT 14 mSv = 1.4e-2, log=-1.85 → y=222 -->
  <circle cx="300" cy="222" r="3.5" fill="#C8860E"/>
  <line x1="305" y1="222" x2="350" y2="222" stroke="#545454" stroke-width="0.5"/>
  <text x="356" y="226" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8860E">PET-CT · 14 mSv</text>

  <!-- Full-body CT 20 mSv, log=-1.7 → y=215 — close to PET-CT; offset -->
  <circle cx="300" cy="208" r="3.5" fill="#C8860E"/>
  <line x1="305" y1="208" x2="350" y2="208" stroke="#545454" stroke-width="0.5"/>
  <text x="356" y="212" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8860E">full-body CT · 20 mSv</text>

  <!-- Occupational limit 50 mSv = 5e-2, log=-1.30 → y=184 -->
  <circle cx="300" cy="184" r="3.5" fill="#C8860E"/>
  <line x1="305" y1="184" x2="350" y2="184" stroke="#545454" stroke-width="0.5"/>
  <text x="356" y="188" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8860E">occupational annual limit · 50 mSv</text>

  <!-- Acute symptoms 1 Sv, log=0 → y=138 -->
  <circle cx="300" cy="138" r="3.5" fill="#C8102E"/>
  <line x1="305" y1="138" x2="350" y2="138" stroke="#545454" stroke-width="0.5"/>
  <text x="356" y="142" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">acute symptoms · 1 Sv</text>

  <!-- LD50 4.5 Sv, log=0.65 → y=109 -->
  <circle cx="300" cy="109" r="4" fill="#C8102E"/>
  <line x1="305" y1="109" x2="350" y2="109" stroke="#545454" stroke-width="0.5"/>
  <text x="356" y="112" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">acute lethal (LD₅₀) · 4–5 Sv</text>

