  <title id="fig-title">Radiation Dose Scale — From a Dental X-ray to Acute Lethal Dose</title>
  <desc>Vertical log-scale of equivalent dose in sieverts. Dental X-ray about 0.005 mSv at the bottom. Chest X-ray 0.1 mSv. Transatlantic flight 0.03 mSv. Background per year 3 mSv. Chest CT 7 mSv. PET-CT 14 mSv. Full-body CT 20 mSv. Occupational annual limit 50 mSv. Acute symptoms threshold 1 Sv. Acute lethal range 4 to 5 Sv. Five orders of magnitude separate routine medical imaging from acute danger.</desc>
