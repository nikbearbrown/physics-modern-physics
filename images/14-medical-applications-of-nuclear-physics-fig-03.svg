  <!-- Chest CT 7 mSv = 7e-3, log=-2.15 → y=238 -->
  <circle cx="300" cy="238" r="3.5" fill="#C8860E"/>
  <line x1="305" y1="238" x2="350" y2="238" stroke="#545454" stroke-width="0.5"/>
