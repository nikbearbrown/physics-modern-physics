  <title id="fig-title">Length Contraction — Consequence of Simultaneity Disagreement</title>
  <desc>A long rod moves rightward at velocity v. Two observers: the rod's rest frame at top sees the full proper length L zero. The lab frame at bottom marks both ends of the rod simultaneously in lab time; from the rod's frame, those two marks are NOT simultaneous — one end was marked before the other. The lab measurement L equals L zero over gamma is shorter than the proper length. The shorter measurement is real, not a mistake.</desc>
