  <text x="430" y="376" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#545454" letter-spacing="0.06em">AGE (years, log)</text>

  <!-- Bars: log10(min) to log10(max). x = 200 + (log-2)*51.1 -->
  <!-- C-14: 10^3 to 5×10^4 → x=251 to 387 -->
  <rect x="251" y="120" width="136" height="30" fill="#56B4E9"/>
  <text x="194" y="140" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#2a1a0e">¹⁴C</text>
