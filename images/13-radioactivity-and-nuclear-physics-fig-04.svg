  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Radioactive Dating — Each Isotope Reads Its Own Era</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Useful range ≈ ±2 half-lives. From archaeology (10³ yr) to oldest rocks (10¹⁰ yr).</text>

