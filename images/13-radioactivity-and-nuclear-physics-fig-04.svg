  <rect x="353" y="160" width="256" height="30" fill="#56B4E9"/>
  <text x="194" y="180" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#2a1a0e">⁴⁰K</text>
