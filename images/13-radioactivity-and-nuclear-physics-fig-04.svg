  <title id="fig-title">Radioactive Dating Clocks — Each Isotope Has Its Range</title>
  <desc>Horizontal log-scale bar chart of useful dating ranges. Carbon-14 with half-life 5730 years is useful from about a thousand to fifty thousand years — archaeology. Potassium-40 with half-life 1.25 billion years is useful for geology. Uranium-238 with half-life 4.5 billion years is useful for meteorites and Earth's age. Rubidium-87 with half-life 49 billion years and samarium-neodymium for the oldest rocks.</desc>
