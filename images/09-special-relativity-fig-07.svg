  <title id="fig-title">Mass-Energy Equivalence at Real-World Scales</title>
  <desc>Horizontal log bar chart of energy released by converting 1 gram of mass via different processes. Chemical burning converts roughly 10 to the minus 9 of the rest mass; fission converts 10 to the minus 3; fusion converts 10 to the minus 2; matter-antimatter annihilation converts 100 percent. The Sun loses roughly 4 million tonnes per second to fusion. The span from chemistry to annihilation is a factor of about a billion.</desc>
