  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">What c² Actually Means — Energy from 1 Gram</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Annihilation: 9×10¹³ J per gram. Chemistry: 10⁵ J per gram. Factor of a billion.</text>

  <!-- Axes -->
  <line x1="200" y1="340" x2="660" y2="340" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="200" y1="100" x2="200" y2="340" stroke="#2a1a0e" stroke-width="1"/>

  <!-- X-axis: log E from 10^4 to 10^14 J. 10 dec over 460 px = 46 px/dec.
       x(E) = 200 + (logE - 4)*46 -->
  <g font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454" text-anchor="middle">
    <text x="200" y="356">10⁴</text>
    <text x="292" y="356">10⁶</text>
    <text x="384" y="356">10⁸</text>
    <text x="476" y="356">10¹⁰</text>
    <text x="568" y="356">10¹²</text>
    <text x="660" y="356">10¹⁴ J</text>
  </g>
  <text x="430" y="378" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#545454" letter-spacing="0.06em">ENERGY FROM 1 GRAM (J, LOG)</text>

  <!-- Bars. log(E) → x = 200 + (logE-4)*46 -->
  <!-- Chemistry: 1 g of TNT ~4.2 kJ = 4200 J → logE=3.62 — below scale. Use chemical fuel ~ 10^5 J/g; logE=5 → x=246 -->
  <rect x="200" y="120" width="46" height="30" fill="#C8860E"/>
  <text x="194" y="140" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#2a1a0e">Chemistry</text>
  <text x="256" y="140" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8860E">~ 10⁵ J/g · Δm/m ~ 10⁻⁹</text>

  <!-- Fission: 1 g U-235 → ~8.2e10 J; logE=10.91 → x = 200 + 6.91*46 = 517.9 -->
  <rect x="200" y="170" width="318" height="30" fill="#C8102E" opacity="0.5"/>
  <text x="194" y="190" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#2a1a0e">Fission</text>
  <text x="528" y="190" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">~ 10¹¹ J/g · Δm/m ~ 10⁻³</text>

  <!-- Fusion: D+T → ~3.4e11 J/g (1% conversion); logE=11.53 → x=546.4 -->
  <rect x="200" y="220" width="346" height="30" fill="#C8102E" opacity="0.7"/>
  <text x="194" y="240" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#2a1a0e">Fusion</text>
  <text x="556" y="240" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">~ 3×10¹¹ J/g · Δm/m ~ 10⁻²</text>

  <!-- Annihilation: 1 g × c² = 9×10^13 J; logE=13.95 → x=657.7 -->
  <rect x="200" y="270" width="458" height="30" fill="#56B4E9"/>
  <text x="194" y="290" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#2a1a0e">Annihilation</text>
  <text x="668" y="290" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#FFFFFF">9×10¹³ J/g · Δm/m = 1</text>

  <!-- Caption -->
  <rect x="200" y="386" width="460" height="22" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="430" y="402" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#2a1a0e">Annihilation extracts everything. Chemistry barely scratches the surface.</text>
