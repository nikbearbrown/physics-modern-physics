  <title id="fig-title">Millikan's Photoelectric Plot — K_max vs Frequency</title>
  <desc>Plot of maximum kinetic energy of photoelectrons versus the frequency of incident light. Below threshold frequency, no electrons. Above threshold, a straight line with slope equal to Planck's constant h and y-intercept equal to minus the work function. Data points are Millikan's actual 1916 measurements on sodium. He set out to disprove Einstein and ended up confirming him.</desc>
  <metadata>
    <cajal:figure
      xmlns:cajal="https://bearbrown.ai/cajal/1.0"
