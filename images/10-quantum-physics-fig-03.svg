  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Experiment 2: Photoelectric Effect — Millikan's 1916 Confirmation</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">He tried to disprove Einstein's hf quanta. Instead, he measured h to high precision.</text>

  <!-- Axes -->
  <line x1="100" y1="320" x2="640" y2="320" stroke="#2a1a0e" stroke-width="1"/>
  <line x1="100" y1="100" x2="100" y2="380" stroke="#2a1a0e" stroke-width="1"/>

  <text x="50" y="220" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#545454" letter-spacing="0.06em" transform="rotate(-90 50 220)">K_max (eV)</text>
  <text x="380" y="404" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#545454" letter-spacing="0.06em">FREQUENCY f (× 10¹⁴ Hz)</text>

  <!-- Y-axis labels (positive K_max) -->
  <g font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454" text-anchor="end">
    <text x="94" y="324">0</text>
    <text x="94" y="264">0.5</text>
    <text x="94" y="204">1.0</text>
    <text x="94" y="144">1.5</text>
    <text x="94" y="104">2.0</text>
  </g>
  <g stroke="#2a1a0e" stroke-width="0.5">
    <line x1="95" y1="260" x2="105" y2="260"/>
    <line x1="95" y1="200" x2="105" y2="200"/>
    <line x1="95" y1="140" x2="105" y2="140"/>
    <line x1="95" y1="100" x2="105" y2="100"/>
  </g>

  <!-- Negative y-intercept zone (below x-axis) -->
  <text x="94" y="354" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">−φ</text>

  <!-- X-axis labels (frequency in 10^14 Hz) -->
  <g font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454" text-anchor="middle">
    <text x="100" y="338">0</text>
    <text x="208" y="338">5</text>
    <text x="316" y="338">10</text>
    <text x="424" y="338">15</text>
    <text x="532" y="338">20</text>
    <text x="640" y="338">25</text>
  </g>

  <!-- Line: K_max = hf - φ. Threshold f_0 around 5.5e14 Hz for sodium (φ=2.28 eV). Slope = h ≈ 4.136e-15 eV·s. So at f=10e14, KE = 4.136 - 2.28 ≈ 1.86 eV; at f=15e14, KE=3.92 (off scale top). Adjust: x mapping 100 + (f/1e14)*21.6. At f=5.5: x=219; at f=10: x=316; at f=15: x=424. -->
  <!-- Line through (f_0, 0)=(219, 320) and (f=10, KE=1.86): At f=10 → y = 320 - 1.86*120 = 320 - 223 = 97 — too steep. Let me use realistic Millikan slope.
       Use: slope-visual = (1.0 eV) / (5e14 Hz) → at f=10e14, KE=1.0 eV → y = 320 - 120 = 200. Threshold: KE=0 at f_0=5.5e14 → x=219. At f=20e14: KE=2.9 → off chart top.
       Better: slope = 0.4 eV per 1e14 Hz visually. At f=15: KE=(15-5.5)*0.4=3.8 — still too big. Let me just truncate sensibly.
       Use shallow visual slope so line fits in the panel: line from (219, 320) to (640, 100). -->
  <line x1="219" y1="320" x2="640" y2="100" stroke="#56B4E9" stroke-width="2.5"/>

  <!-- Extrapolation below x-axis (dashed) to negative y-intercept at x=100, y=350 -->
  <line x1="100" y1="350" x2="219" y2="320" stroke="#56B4E9" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Y-intercept marker (negative) -->
  <circle cx="100" cy="350" r="3.5" fill="#C8102E"/>

  <!-- Threshold marker on x-axis -->
  <circle cx="219" cy="320" r="3.5" fill="#C8102E"/>
  <line x1="219" y1="320" x2="219" y2="340" stroke="#C8102E" stroke-width="0.5"/>
  <text x="219" y="354" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">f₀</text>

  <!-- Data points (Millikan-style) -->
  <g fill="#C8102E">
    <circle cx="240" cy="310" r="3"/>
    <circle cx="280" cy="290" r="3"/>
    <circle cx="320" cy="270" r="3"/>
    <circle cx="370" cy="246" r="3"/>
    <circle cx="420" cy="218" r="3"/>
    <circle cx="470" cy="195" r="3"/>
    <circle cx="520" cy="170" r="3"/>
    <circle cx="570" cy="143" r="3"/>
    <circle cx="610" cy="120" r="3"/>
  </g>

  <!-- Slope annotation -->
  <text x="540" y="190" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#56B4E9">slope = h</text>
  <text x="540" y="204" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">(Planck's constant)</text>

  <!-- Caption -->
  <rect x="100" y="382" width="540" height="22" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="370" y="398" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#2a1a0e">Millikan: "I have measured h to better than 1% — and confirmed Einstein."</text>
