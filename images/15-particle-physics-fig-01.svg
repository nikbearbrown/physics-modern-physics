  <title id="fig-title">Anderson 1932 — The First Positron Track in a Cloud Chamber</title>
  <desc>Schematic of Anderson's published cloud chamber photograph that announced the positron. A horizontal lead plate splits the chamber. A curved track passes through. Above the plate the curvature is tighter (lower energy); below it the curvature is broader (the particle entered from below at higher energy and lost energy crossing the lead). Curvature direction in the applied magnetic field rules out a negatively charged electron — the particle is positive. Track thickness rules out a proton — too light. Therefore: a positive electron, the positron.</desc>
