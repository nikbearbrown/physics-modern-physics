  <title id="fig-title">Onion-Shell Burning — A Massive Star at the End</title>
  <desc>Cross-section of a massive star near supernova. From outermost to innermost: hydrogen-burning shell (millions of years), helium shell (100000 years), carbon shell (1000 years), oxygen and neon shell (1 year), silicon shell (1 day), iron core (no more fusion). Each layer burns faster than the one outside it. Iron is the most tightly bound nucleus — fusion stops.</desc>
