  <text x="290" y="278" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">m_t = 172.7 ± 0.3 GeV  (measured at LHC, ATLAS/CMS)</text>

  <!-- Caption -->
  <rect x="60" y="340" width="580" height="60" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="360" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">Coupling strengths are measured one by one in LHC events.</text>
  <text x="350" y="378" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">The Higgs boson at 125 GeV is the mediator; each fermion mass is a separate datum.</text>
  <text x="350" y="394" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">No theory predicts the values — they are SM parameters, fit to data.</text>
