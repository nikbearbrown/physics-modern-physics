  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Higgs Mechanism — Mass = Coupling × LHC Calibration</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">See Ch 6 Fig 6.4 for the concept. Here: experimental measurements from ATLAS/CMS.</text>

