  <text x="350" y="138" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#56B4E9">no coupling → m = 0 (measured: &lt; 10⁻²⁷ GeV)</text>

