  <title id="fig-title">Higgs Mechanism — Mass from a Field (Experimental Framing)</title>
  <desc>Three particles traveling through Higgs-filled space (stippled background). Photon: no coupling, no drag, massless. Electron: small coupling, slight drag, 0.511 MeV. Top quark: strong coupling, heavy drag, 173 GeV. Mass is measured at the LHC; coupling strength fits the Standard Model. See Chapter 6 Figure 6.4 for the conceptual introduction.</desc>
