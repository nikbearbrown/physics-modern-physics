  <line x1="120" y1="296" x2="128" y2="296" stroke="#545454" stroke-width="0.5"/>
  <text x="116" y="220" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#545454">h</text>

  <!-- Period -->
  <text x="180" y="332" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#2a1a0e">Δt₀ = 2h / c</text>
  <text x="180" y="350" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">proper time</text>

