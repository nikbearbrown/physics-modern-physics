  <text x="510" y="332" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#C8102E">Δt = γ Δt₀  &gt;  Δt₀</text>
  <text x="510" y="350" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">dilated time</text>

  <!-- Caption -->
  <rect x="60" y="380" width="580" height="60" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="400" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">Same clock, two frames. The light travels farther in (B) than in (A).</text>
  <text x="350" y="418" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">Because c is invariant, the longer path takes more time — γ = 1/√(1 − v²/c²).</text>
  <text x="350" y="434" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">Time dilation is Pythagoras applied to the postulates.</text>
