<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="fig-title">
  <title id="fig-title">The Light Clock — Same Clock, Two Frames</title>
  <desc>Two side-by-side panels of the same light clock — two mirrors with a light pulse bouncing between them. Panel A rest frame: vertical path of height h, period two h over c. Panel B moving frame: the clock moves rightward at velocity v, so the light traces a diagonal — the hypotenuse of a right triangle with vertical leg h and horizontal leg v Delta t over two. Same c in both frames means the longer diagonal path takes longer; time dilation is the geometric consequence.</desc>
