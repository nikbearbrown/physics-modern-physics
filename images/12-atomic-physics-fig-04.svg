  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Cutoff λ_min set by tube voltage. Peaks (Kα, Kβ) set by target's atomic structure.</text>

