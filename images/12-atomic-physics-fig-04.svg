  <title id="fig-title">X-ray Tube Spectrum — Bremsstrahlung Plus Characteristic Peaks</title>
  <desc>Plot of X-ray intensity versus wavelength. Continuous bremsstrahlung curve starts at minimum wavelength lambda min equals h c over q V (where V is the tube voltage), peaks at intermediate wavelength, then falls. Sharp characteristic peaks sit on top of the continuous background at K alpha and K beta wavelengths — the atomic transitions of the target element. The cutoff is set by the tube voltage; the peaks are set by the target material.</desc>
