  <!-- λ_min cutoff: sharp left edge of bremsstrahlung at x ≈ 220 (≈21 pm for 60 kV tube) -->
  <line x1="220" y1="100" x2="220" y2="340" stroke="#C8102E" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="220" y="92" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">λ_min = hc/(qV)</text>
  <text x="220" y="80" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="8" fill="#545454">cutoff @ 60 kV</text>

