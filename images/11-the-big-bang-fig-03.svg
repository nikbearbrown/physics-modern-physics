  <desc>Schematic of the full-sky cosmic microwave background temperature map in Mollweide projection. The actual image shows tiny temperature fluctuations of about 10 to the minus 5 of the mean 2.7 kelvin background. Cooler (blue) and warmer (orange) patches at sub-degree scales encode the seed inhomogeneities that grew into today's galaxies. Galactic plane is masked in the actual image.</desc>
