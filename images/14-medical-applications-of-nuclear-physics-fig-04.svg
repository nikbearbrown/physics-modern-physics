  <title id="fig-title">Bragg Peak vs X-ray Depth Dose — Why Proton Therapy Spares Healthy Tissue</title>
  <desc>Plot of relative dose versus depth in tissue. X-ray beam peaks at about 3 centimeters and decays exponentially, still depositing substantial dose at 20 centimeters — meaning healthy tissue downstream of a tumor receives unwanted dose. Proton beam has low entrance dose, builds gradually, sharp Bragg peak at the tuned depth (here about 15 cm), drops to essentially zero beyond. Tumor location is marked at the peak depth.</desc>
