  <title id="fig-title">PET Coincidence Detection — Two 511-keV Gammas from One Annihilation</title>
  <desc>Cross-section of a PET ring scanner. A fluorine-18 nucleus in tissue undergoes positron decay; the positron travels a few millimeters then annihilates with an electron. Two 511 keV gamma rays fly off in opposite directions and are detected within a few nanoseconds at opposing ring detector elements. The line connecting the two hits passes through the annihilation site. Three sample coincidence lines converge on a hot-spot region (tumor with elevated glucose uptake).</desc>
