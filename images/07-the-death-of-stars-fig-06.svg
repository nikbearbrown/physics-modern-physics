  <desc>Schematic of the Crab Nebula, the remnant of the supernova recorded by Chinese astronomers in 1054. A diffuse expanding cloud about 11 light-years across, color-coded to suggest the actual Hubble/Chandra composite — bluish synchrotron core, reddish-orange filamentary outer regions. Central marker for the Crab Pulsar — a 33 millisecond pulsar that powers the entire nebula by shedding rotational energy.</desc>
