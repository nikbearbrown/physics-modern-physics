  <title id="fig-title">Alpha Decay — Tunneling Through the Coulomb Barrier (Out)</title>
  <desc>Potential energy versus distance from nuclear center. A deep strong-force well at small r holds the alpha particle. At the nuclear surface, the Coulomb repulsion takes over and rises to a peak around 30 MeV, then falls as 1 over r outside. The alpha kinetic energy is around 5 MeV — far below the barrier peak. Classically the alpha is trapped. Quantum-mechanically the wavefunction has a tiny amplitude outside the barrier, and the alpha tunnels out. Mirror of Chapter 3 Figure 3.2 — but going OUT instead of IN.</desc>
