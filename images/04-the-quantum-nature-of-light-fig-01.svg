  <!-- Y-axis label -->
  <text x="100" y="96" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="8" fill="#545454">∞</text>

  <!-- Classical Rayleigh-Jeans curve (~1/λ^4 at short λ) - diverges -->
  <path d="M 110 100 Q 140 110 180 150 Q 210 200 240 250 Q 280 290 340 310 Q 420 322 540 332 Q 600 336 660 338" stroke="#C8102E" stroke-width="2.5" fill="none"/>
  <text x="120" y="120" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8102E">classical (Rayleigh-Jeans)</text>
  <text x="120" y="134" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">diverges as λ → 0</text>

  <!-- Planck curve - peaks ~500nm (for ~5800K) and rolls off both directions -->
  <!-- At λ=0: 0 (y=340); peak at ~λ=500nm (y=140); decays for longer λ -->
