  <title id="fig-title">Blackbody Curves — The Ultraviolet Catastrophe</title>
  <desc>Spectral radiance as a function of wavelength for a blackbody at solar temperature. The classical Rayleigh-Jeans curve diverges to infinity as wavelength shrinks toward the ultraviolet — the catastrophe. Planck's quantum curve peaks at visible wavelengths and rolls off at both short and long wavelengths, matching observation.</desc>
