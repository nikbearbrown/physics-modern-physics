  <rect x="100" y="386" width="560" height="26" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="380" y="404" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#2a1a0e">Planck added a quantization constraint (E = nhf) and the divergence vanished. Physics changed forever.</text>
