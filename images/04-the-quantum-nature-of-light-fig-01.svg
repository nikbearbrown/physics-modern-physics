  <rect x="160" y="100" width="120" height="240" fill="#545454" opacity="0.12"/>
  <text x="220" y="92" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="8" fill="#545454">visible</text>

  <text x="50" y="220" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#545454" letter-spacing="0.06em" transform="rotate(-90 50 220)">SPECTRAL RADIANCE</text>

  <!-- X-axis labels (wavelength in nm) -->
  <g font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454" text-anchor="middle">
    <text x="100" y="356">0</text>
