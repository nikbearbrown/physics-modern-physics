<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="fig-title">
  <title id="fig-title">Relativity of Simultaneity — Two Observers Disagree on "At the Same Time"</title>
  <desc>Two side-by-side panels. Panel A: train frame with observer A at the center of the car; two lightning strikes hit both ends simultaneously, and the light reaches A at the same instant. Panel B: platform frame with observer B watching the train move rightward; the front-strike light has a shorter path to B because the train was moving toward the front strike, so it arrives first. Both observers reason correctly, both disagree about whether the strikes happened together.</desc>
  <metadata>
    <cajal:figure
      xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Physics +1: Modern Physics"
      book-slug="physics-modern-physics"
