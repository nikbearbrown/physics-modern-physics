  <title id="fig-title">Alpha vs Gamma — Same Energy, Very Different Damage</title>
  <desc>Two panels of tissue rendered as grids of cells. Panel A alpha particle: dense ionization track terminating within about 50 micrometers; every cell along the path is heavily damaged. Panel B gamma ray: sparse ionization events across centimeters; isolated cells hit. Same total energy deposited, vastly different spatial distribution. The radiation weighting factor w_R equals 20 for alpha and 1 for gamma reflects this damage density.</desc>
