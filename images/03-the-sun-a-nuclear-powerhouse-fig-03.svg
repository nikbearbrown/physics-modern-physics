<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="fig-title">
  <title id="fig-title">Proton-Proton Chain — Four Protons In, One Helium-4 Out</title>
  <desc>Three reaction steps. Step 1, slow and rate-limiting: two protons fuse to form a deuteron, emitting a positron and an electron neutrino — requires both quantum tunneling and a weak-force conversion of one proton to a neutron. Step 2, fast: deuteron plus proton fuses to helium-3, emitting a gamma photon. Step 3, fast: two helium-3 nuclei combine to give helium-4 and recycle two protons. Net: four protons converted to one helium-4 with 0.7 percent of the mass becoming energy — 26.7 MeV per cycle.</desc>
