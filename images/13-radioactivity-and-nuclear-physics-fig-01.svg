  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">A teaspoon of nuclear matter ≈ 10⁹ tonnes. See Ch 12 Fig 12.1 for structural angle.</text>

