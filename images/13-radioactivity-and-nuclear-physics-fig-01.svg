  <title id="fig-title">Nuclear Scale and Density — a Teaspoon Weighs a Billion Tonnes</title>
  <desc>Schematic showing atom and nucleus at scale. Nucleus is about 10 to the minus 14 meters across, 10000 times smaller than the atom. Density is about 2 times 10 to the 17 kilograms per cubic meter — a teaspoon of nuclear matter weighs about a billion tonnes. The implication, not the geometry, is the focus here.</desc>
