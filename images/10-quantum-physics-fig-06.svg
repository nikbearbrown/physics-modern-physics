  <title id="fig-title">de Broglie Wavelength vs Momentum — Wave Behavior Across All Scales</title>
  <desc>Log-log plot of de Broglie wavelength versus momentum. Slope is minus one. Marker points: 100 electron-volt electron at 0.12 nanometers, room-temperature neutron at 0.18 nanometers, C60 buckyball at about 3 picometers, 1 kilogram thrown ball at 10 to the minus 35 meters. Shaded observable region above one atomic spacing.</desc>
