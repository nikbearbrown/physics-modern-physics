  <!-- Slope -1 line. λ = h/p. At p=10^-30 kg·m/s, λ=h/p=6.6e-34/10^-30=6.6e-4 m → logλ=-3.18 → y=380 - 32.82*9.33 = 74.7
       At p=10^3 kg·m/s, λ=6.6e-37 m → logλ=-36.18 → y=380 - (-0.18)*9.33 ≈ 381.7
       Wait that's backwards. Let me redo: y(λ) = 380 - (logλ+36)*9.33.
       Logλ = -36.18 → y = 380 - (-0.18)*9.33 = 380 + 1.7 = 381.7 (below axis)
       Logλ = -3.18 → y = 380 - 32.82*9.33 = 380 - 306 = 74 (above top)
       Need line through small p / big λ → high; and big p / small λ → low.

       Constrain to chart: line through (p=10^-26, λ=h/p=6.6e-8 m, logλ=-7.18) → x = 100 + (-26+30)*16.97 = 168; y = 380 - (28.82)*9.33 = 380 - 269 = 111
       And (p=10^0=1, λ=6.6e-34 m, logλ=-33.18) → x = 100 + 30*16.97 = 609; y = 380 - 2.82*9.33 = 354
       So draw line from (168, 111) extrapolated -->
