  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">λ = h/p · slope −1 on log-log. For a thrown ball, λ is 25 orders below atomic spacing.</text>

