  <title id="fig-title">Bohr Energy Ladder for Hydrogen — Balmer Lines Emerge from Quantized Levels</title>
  <desc>Vertical energy axis from minus 13.6 eV (ground state n equals 1) up to 0 eV (ionization at n equals infinity). Horizontal lines at the six lowest levels. Downward arrows from n equals 3, 4, 5, 6 to n equals 2 — the four Balmer transitions in the visible. Each arrow is labeled with the photon wavelength: 656 nm red (H-alpha), 486 nm cyan (H-beta), 434 nm violet (H-gamma), 410 nm deep violet (H-delta).</desc>
