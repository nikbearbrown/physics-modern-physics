  <!-- y mapping: 0 eV → y=100 (top), -13.6 eV → y=380 (bottom). 280 px / 13.6 = 20.6 px/eV -->
  <!-- E_n = -13.6/n²
       n=1: -13.6 → y=380
       n=2: -3.40 → y=170 (actually 100 + (13.6-3.4)*20.6 = 310 from top base; or y = 380 - (E - (-13.6))*20.6 — wait let me redo
       Let baseline y=380 for E=-13.6, and y=100 for E=0. Δy=280 for ΔE=13.6.
       y(E) = 100 + (-E)*280/13.6 = 100 - E*20.59
       n=1: E=-13.6 → y=100 - (-13.6)*20.59 = 100 + 280 = 380 ✓
       n=2: E=-3.40 → y=100 + 3.4*20.59 = 100 + 70 = 170
       n=3: E=-1.51 → y=100 + 31 = 131
       n=4: E=-0.85 → y=100 + 17.5 = 117.5
       n=5: E=-0.544 → y=100 + 11.2 = 111
       n=6: E=-0.378 → y=100 + 7.8 = 108 -->

