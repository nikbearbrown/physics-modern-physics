  <title id="fig-title">Michelson-Morley Interferometer — The Null Result That Killed the Aether</title>
  <desc>Top-down schematic of the 1887 interferometer. A monochromatic light source on the left. A beamsplitter at the center. Two perpendicular arms with mirrors at their ends. The two beams recombine at the detector. If a luminiferous aether existed and Earth moved through it, the two arm-lengths should produce a measurable fringe shift as the apparatus rotates. Michelson and Morley measured zero — to far better than the predicted sensitivity. Aether wind: not detected.</desc>
