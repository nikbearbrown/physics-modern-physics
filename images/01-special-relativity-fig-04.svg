<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="fig-title">
  <title id="fig-title">Muon Story — Same Particle, Two Frames, Two Derivations</title>
  <desc>Two vertical columns show the same muon arriving at a ground detector after being produced at the top of Earth's atmosphere. Panel A Earth frame: 15 km atmosphere column, muon moving down at 0.99 c, gamma about 7 dilates the muon's 2.2 microsecond lifetime to 15 microseconds — enough time to reach the ground. Panel B muon frame: atmosphere length-contracted to about 2 km, muon at rest, Earth rushing up at 0.99 c — the contracted atmosphere is crossed in 2.2 microseconds.</desc>
  <metadata>
    <cajal:figure
      xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Physics +1: Modern Physics"
      book-slug="physics-modern-physics"
      chapter="01-special-relativity"
      figure-number="04"
      figure-title="Muon From Two Frames"
