  <text x="360" y="388" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">Becquerel discovered radioactivity in 1896 by accident; Rutherford named the three types in 1899.</text>
