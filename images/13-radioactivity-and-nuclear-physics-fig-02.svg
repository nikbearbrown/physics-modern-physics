  <title id="fig-title">Rutherford's Magnetic Deflection — Three Kinds of Radiation</title>
  <desc>Radium sample sits in a lead block with a narrow exit channel. Radiation passes through a perpendicular magnetic field. Three beams emerge: alpha particles (heavy, positive, slightly deflected one way), beta particles (light, negative, strongly deflected the other way), gamma rays (uncharged, undeflected, straight through). A detection screen on the far side records where each beam lands.</desc>
