  <title id="fig-title">Photospheric Granulation — Convection Made Visible</title>
  <desc>Schematic of the Sun's photosphere showing the granulation pattern: bright polygonal cells where hot plasma rises, separated by darker lanes where cooler plasma sinks. Each cell is about 1000 kilometers across and lives roughly 8 minutes. The pattern is the top of the convection zone made visible at the surface.</desc>
