<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="fig-title">
  <title id="fig-title">Higgs Mechanism — Mass Is Coupling Strength to a Field</title>
  <desc>Three particles travel through space filled with the Higgs field (shown as a stippled background). A photon passes through unaffected because it has zero coupling to the Higgs — massless. A light fermion (electron) experiences slight drag — light mass. A top quark experiences heavy drag — heaviest known particle. Mass is not intrinsic — it is how strongly a particle interacts with the field that fills space.</desc>
