  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Higgs Mechanism — Mass Is How Strongly You Couple to the Field</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Not molasses. A coupling constant.</text>

  <!-- Background: Higgs field stipple -->
  <rect x="60" y="90" width="580" height="240" fill="url(#higgs-stipple)" stroke="#7B61A8" stroke-width="1"/>
  <text x="70" y="108" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#7B61A8" letter-spacing="0.06em">HIGGS FIELD (fills all space)</text>

  <!-- Photon (top): straight, fast, unaffected -->
  <line x1="80" y1="150" x2="620" y2="150" stroke="#56B4E9" stroke-width="2.5" marker-end="url(#arrowblue)"/>
  <circle cx="80" cy="150" r="6" fill="#56B4E9"/>
  <text x="62" y="154" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#56B4E9">γ</text>
  <text x="350" y="138" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#56B4E9">photon — no coupling → massless</text>

  <!-- Light fermion (middle): slight drag -->
  <line x1="80" y1="210" x2="500" y2="210" stroke="#C8860E" stroke-width="2.5" marker-end="url(#arrowoch)"/>
  <circle cx="80" cy="210" r="6" fill="#C8860E"/>
  <text x="62" y="214" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8860E">e⁻</text>
  <!-- Slight wavy drag -->
  <g stroke="#7B61A8" stroke-width="0.5" opacity="0.7">
    <line x1="200" y1="208" x2="200" y2="216"/>
    <line x1="280" y1="208" x2="280" y2="216"/>
    <line x1="360" y1="208" x2="360" y2="216"/>
    <line x1="440" y1="208" x2="440" y2="216"/>
  </g>
  <text x="280" y="198" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8860E">electron — small coupling → 0.511 MeV</text>

  <!-- Top quark (bottom): heavy drag -->
  <line x1="80" y1="280" x2="280" y2="280" stroke="#C8102E" stroke-width="2.5" marker-end="url(#arrowred)"/>
  <circle cx="80" cy="280" r="8" fill="#C8102E"/>
  <text x="62" y="285" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#C8102E">t</text>
