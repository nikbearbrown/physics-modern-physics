    <line x1="200" y1="270" x2="200" y2="290"/>
    <line x1="240" y1="270" x2="240" y2="290"/>
  </g>
  <text x="290" y="278" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">top quark — strong coupling → 173 GeV (heaviest)</text>

  <!-- Caption -->
  <rect x="60" y="346" width="580" height="60" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="368" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">Mass is the coupling constant — not "stickiness" in molasses.</text>
  <text x="350" y="386" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">You weigh what you do because your quarks and electrons couple to a field discovered in 2012.</text>
  <text x="350" y="400" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">Englert &amp; Higgs (1964) predicted; ATLAS &amp; CMS (CERN, 2012) confirmed.</text>
</svg>
