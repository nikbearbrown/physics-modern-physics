  <text x="555" y="186" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">H α</text>
  <text x="555" y="174" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="8" fill="#545454">656 nm</text>

  <!-- Caption -->
  <rect x="60" y="360" width="580" height="44" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="380" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="12" fill="#2a1a0e">Each line names an element. Payne-Gaposchkin (1925) read this script and saw hydrogen.</text>
  <text x="350" y="398" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">Rainbow is the one Brutalist exception — visible light IS rainbow.</text>
