  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Fraunhofer Lines — Reading the Sun's Composition</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Each dark line is an element absorbing in the Sun's photosphere.</text>

  <!-- Rainbow spectrum strip -->
  <rect x="60" y="220" width="580" height="60" fill="url(#visiblespec)" stroke="#2a1a0e" stroke-width="1"/>

  <!-- Wavelength axis -->
  <g font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454" text-anchor="middle">
    <text x="60" y="298">400</text>
    <text x="155" y="298">450</text>
    <text x="250" y="298">500</text>
    <text x="345" y="298">550</text>
    <text x="440" y="298">600</text>
    <text x="535" y="298">650</text>
    <text x="640" y="298">700 nm</text>
  </g>
  <text x="350" y="316" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="9" fill="#545454" letter-spacing="0.06em">WAVELENGTH (nm)</text>

  <!-- Absorption lines (black vertical bars on spectrum) -->
  <!-- λ axis: 400nm at x=60, 700nm at x=640. Δ=580/300 = 1.933 per nm. x(λ) = 60 + (λ-400)*1.933 -->
  <!-- Ca K 393 → off-scale left, skip
       Ca H 396 → off-scale
       Hβ 486 → x = 60 + 86*1.933 = 226
       Mg b 518 → x = 60 + 118*1.933 = 288
       Fe 527  → x = 60 + 127*1.933 = 305
       Na D 589 → x = 60 + 189*1.933 = 425
       Hα 656 → x = 60 + 256*1.933 = 555
  -->
  <g stroke="#1a1208" stroke-width="2.5">
    <line x1="60" y1="220" x2="60" y2="280"/>
    <line x1="226" y1="220" x2="226" y2="280"/>
    <line x1="288" y1="220" x2="288" y2="280"/>
    <line x1="305" y1="220" x2="305" y2="280"/>
    <line x1="425" y1="220" x2="425" y2="280"/>
    <line x1="555" y1="220" x2="555" y2="280"/>
  </g>

