<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="fig-title">
  <title id="fig-title">Solar Absorption Spectrum — The Fraunhofer Lines</title>
  <desc>A continuous rainbow gradient from violet at 400 nanometers on the left to red at 700 nanometers on the right represents the solar continuum. Dark vertical lines mark wavelengths where specific elements in the Sun's atmosphere absorb light: H-alpha at 656 nanometers, sodium D at 589, magnesium b at 518, iron lines around 527, hydrogen H-beta at 486, calcium H and K near 393 to 397. Labels with leader lines identify each element. The spectrum is how we know what the Sun is made of.</desc>
