  <line x1="295" y1="195" x2="295" y2="218" stroke="#545454" stroke-width="0.5"/>
  <text x="295" y="186" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">Mg / Fe</text>

  <line x1="425" y1="195" x2="425" y2="218" stroke="#545454" stroke-width="0.5"/>
  <text x="425" y="186" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">Na D</text>
  <text x="425" y="174" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="8" fill="#545454">589 nm</text>

