  <title id="fig-title">Periodic Table by Origin — Where Each Element Came From</title>
  <desc>The periodic table color-coded by the primary cosmic origin of each element. Big Bang nucleosynthesis: hydrogen and helium (plus a trace of lithium). Cosmic-ray spallation: lithium, beryllium, boron. Stellar fusion (low to intermediate mass stars): carbon through iron. S-process (asymptotic giant branch stars): copper through bismuth. R-process (supernovae and neutron-star mergers): heavy elements like gold, platinum, uranium. The periodic table is a map of stellar history.</desc>
