  <title id="fig-title">Why Atoms Don't Collapse — Two Energy Costs Balance at the Bohr Radius</title>
  <desc>Energy as a function of electron confinement radius. The kinetic-energy cost (sky-blue) rises as 1 over r squared as the electron is confined more tightly — the uncertainty principle exacts a price for localization. The Coulomb potential energy (orange) falls as minus 1 over r as the electron sits closer to the proton. Their sum (black) has a minimum at the Bohr radius — that is where matter is stable.</desc>
