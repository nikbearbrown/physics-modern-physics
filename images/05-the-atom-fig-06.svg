  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

  <text x="32" y="36" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="14" fill="#2a1a0e">Why You Don't Fall Through the Floor — Energy Balance at the Bohr Radius</text>
  <text x="32" y="56" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Confinement costs KE; expansion can't pay Coulomb. The minimum is the atom's size.</text>

  <!-- Axes -->
  <line x1="100" y1="240" x2="660" y2="240" stroke="#2a1a0e" stroke-width="0.5"/>
  <line x1="100" y1="100" x2="100" y2="380" stroke="#2a1a0e" stroke-width="1"/>

  <text x="50" y="240" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#545454" letter-spacing="0.06em" transform="rotate(-90 50 240)">ENERGY (signed)</text>
  <text x="380" y="404" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#545454" letter-spacing="0.06em">CONFINEMENT RADIUS r (log)</text>

  <!-- Y-axis labels -->
  <text x="94" y="244" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">0</text>
  <text x="94" y="104" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">+</text>
  <text x="94" y="378" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454">−</text>

  <!-- X-axis: log r from 10^-12 to 10^-8 m, 4 decades over 560 px = 140 px/decade. Bohr radius ~ 5.3e-11 m -->
  <g font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#545454" text-anchor="middle">
    <text x="100" y="384">10⁻¹²</text>
    <text x="240" y="384">10⁻¹¹</text>
    <text x="380" y="384">10⁻¹⁰</text>
    <text x="520" y="384">10⁻⁹</text>
    <text x="660" y="384">10⁻⁸ m</text>
  </g>

  <!-- Bohr radius marker (~ 5.3e-11 m; log = -10.28; x = 100 + (-10.28 - (-12))*140 = 100 + 1.72*140 = 340 -->
  <line x1="340" y1="100" x2="340" y2="380" stroke="#C8102E" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="340" y="92" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">Bohr radius a₀</text>
  <text x="340" y="78" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="8" fill="#545454">0.053 nm</text>

  <!-- KE cost: rises as 1/r² (positive); diverges at small r -->
  <!-- y(KE) below baseline (above zero is up). At r=10^-12 (x=100): KE huge → y=110.
       At r = Bohr (x=340): KE = +moderate.
       At r → ∞ (x=660): KE → 0 -->
  <path d="M 100 110 Q 160 130 220 170 Q 280 200 340 220 Q 420 230 520 236 Q 600 238 660 240" stroke="#56B4E9" stroke-width="2.5" fill="none"/>
  <text x="180" y="124" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#56B4E9">KE ∝ +1/r² (uncertainty cost)</text>

  <!-- PE: -1/r (negative); diverges to -∞ at small r, but here cap at modest value -->
  <!-- y(PE) above 240 (below baseline). At r=Bohr (x=340), PE = -2 * |E_bohr| = -27.2 eV
       At r=10^-12 (x=100), PE much more negative -->
  <path d="M 100 370 Q 160 360 220 340 Q 280 320 340 300 Q 420 280 520 260 Q 600 250 660 245" stroke="#C8860E" stroke-width="2.5" fill="none"/>
  <text x="180" y="354" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#C8860E">PE ∝ −1/r (Coulomb attraction)</text>

  <!-- Sum (total E): has minimum at Bohr radius -->
  <!-- E_total = KE + PE; at r=Bohr, E = -13.6 eV (minimum). At r small, KE dominates → positive. At r large, both go to 0. -->
  <path d="M 100 130 Q 160 180 220 240 Q 290 290 340 305 Q 400 290 460 270 Q 540 252 660 244" stroke="#2a1a0e" stroke-width="2.5" fill="none"/>
  <text x="450" y="318" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#2a1a0e">total E (KE + PE)</text>

  <!-- Minimum marker on sum curve -->
  <circle cx="340" cy="305" r="4" fill="#C8102E"/>
  <line x1="100" y1="305" x2="340" y2="305" stroke="#C8102E" stroke-width="0.5" stroke-dasharray="2 2"/>
  <text x="94" y="308" text-anchor="end" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">−13.6 eV</text>
  <text x="346" y="318" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="9" fill="#C8102E">minimum</text>
