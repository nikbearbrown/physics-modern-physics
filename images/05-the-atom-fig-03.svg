  <rect x="60" y="356" width="580" height="50" fill="#F5F5F5" stroke="#C8102E" stroke-width="1.25"/>
  <text x="350" y="376" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#2a1a0e">2π r = n λ  →  m v r = n ℏ  (Bohr's rule, recovered)</text>
  <text x="350" y="394" text-anchor="middle" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="11" fill="#C8102E">Quantization comes from waves; integers come from "fits into the circumference."</text>
