  <title id="fig-title">Standing Waves on a Circular Orbit — Why Bohr's Quantization Works</title>
  <desc>Three panels show electron waves wrapped around circular orbits. Panel A n equals 1: one full wavelength fits around the circumference; wave closes on itself. Panel B n equals 2: two wavelengths fit; closes again. Panel C forbidden: a non-integer number of wavelengths fails to close — destructive interference with itself, the wave vanishes. Only integer wavelengths survive, recovering Bohr's quantization rule from a wave argument.</desc>
